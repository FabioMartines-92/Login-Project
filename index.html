<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/media-query.css">
    <title>Login</title>
</head>
<body>
    <main>
        <section id="login">
            <div id="image">
                <!--imagem de fundo-->
            </div>
            <div id="form">
                <h1>Welcome,</h1>
                <p>
                    Nice to have you back. Log in to pick up your journey and keep everything moving smoothly.</p>
                    <form action="login.php" method="post">
                        <div class="field">
                            <span class="material-icons">person</span>
                            <input type="email" name="email" class="ilogin" required autocomplete="email" placeholder="Email" >
                            <label for="email">Login</label>
                        </div>
                        <div class="field">
                            <span class="material-icons">vpn_key</span>
                            <input type="password" name="password" class="ipass" required minlength="8" autocomplete="current-password" placeholder="----------Password---------">
                            <label for="password">Password</label>
                        </div>
                        <div>
                            <input type="submit">
                            <a href="recovery.html">Forgot Password?</a>
                        </div>
                    </form>

            </div>

        </section>
    </main>
</body>
</html>
